<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Axios API Tester</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        .layout { display: grid; gap: 16px; max-width: 820px; }
        .card { border: 1px solid #d0d7de; padding: 16px; border-radius: 8px; }
        input, button { padding: 8px; margin-right: 8px; }
        pre { background: #0d1117; color: #c9d1d9; padding: 12px; border-radius: 6px; overflow: auto; }
    </style>
</head>
<body>
    <div class="layout">
        <div class="card">
            <h1>Axios API 測試頁</h1>
            <p>這個頁面示範較現代的 API 呼叫結構，先登入拿 token，再呼叫保單與理賠 API。</p>
            <div>
                <label>Base URL <input id="baseUrl" value="http://localhost:8082"></label>
            </div>
            <div>
                <label>Username <input id="username" value="trainer"></label>
                <label>Password <input id="password" type="password" value="P@ssw0rd123"></label>
                <button id="loginButton" type="button">登入</button>
            </div>
            <div>
                <label>Claim No <input id="claimNo" value="CLM20260511001"></label>
                <button id="claimButton" type="button">查詢理賠狀態</button>
            </div>
        </div>
        <div class="card">
            <h2>Response</h2>
            <pre id="responsePanel">尚未發送請求</pre>
        </div>
    </div>

    <script>
        let accessToken = '';

        function renderResponse(payload) {
            document.getElementById('responsePanel').textContent = JSON.stringify(payload, null, 2);
        }

        async function login() {
            try {
                const response = await axios.post(document.getElementById('baseUrl').value + '/api/auth/login', {
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                });
                accessToken = response.data.accessToken;
                renderResponse(response.data);
            } catch (error) {
                renderResponse(error.response ? error.response.data : { message: error.message });
            }
        }

        async function queryClaimStatus() {
            try {
                const response = await axios.get(
                    document.getElementById('baseUrl').value + '/api/claims/' + document.getElementById('claimNo').value + '/status',
                    {
                        headers: {
                            Authorization: 'Bearer ' + accessToken
                        }
                    }
                );
                renderResponse(response.data);
            } catch (error) {
                renderResponse(error.response ? error.response.data : { message: error.message });
            }
        }

        document.getElementById('loginButton').addEventListener('click', login);
        document.getElementById('claimButton').addEventListener('click', queryClaimStatus);
    </script>
</body>
</html>
